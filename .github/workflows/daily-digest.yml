name: Daily WSJ digest

# Runs Mode B (fetch headlines -> research each via Claude web search) on a
# schedule and commits the dated digest back to the repo.
on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC = 12:00 ET (noon), daily
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit the generated digest

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the deep digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 wsj_fetch.py --research --limit 10

      - name: Commit the digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "digest-$(date -u +%F).md"
          git diff --cached --quiet || git commit -m "Digest for $(date -u +%F)"
          git push
