name: Daily WSJ digest

# Free, no API keys: fetch today's WSJ headlines (Mode A), commit the digest, and
# publish it to GitHub Pages. The paid deep-research mode (--research) is NOT run
# here — run that on demand locally when you want AI summaries.
on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC = 12:00 ET (noon), daily
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write           # to commit the digest and push the gh-pages branch

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the headline digest (only if none exists for today)
        run: |
          f="digest-$(date -u +%F).md"
          if [ -f "$f" ]; then
            echo "$f already exists (likely a researched digest) — keeping it."
          else
            python3 wsj_fetch.py --limit 10 > "$f"
          fi

      - name: Commit the digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "digest-$(date -u +%F).md"
          git diff --cached --quiet || git commit -m "Digest for $(date -u +%F)"
          git push

      - name: Generate the Pages index
        run: python3 generate_index.py   # builds ./public (index.html + digest copies)

      - name: Build the search index
        run: python3 build_search_index.py   # writes ./public/search-index.json + search.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # built-in, no new secret needed
          publish_dir: ./public
          publish_branch: gh-pages
